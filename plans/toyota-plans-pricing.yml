description: Toyota's connected-car and telematics surfaces are sold to retail customers as Connected
  Services subscriptions bundled with the vehicle, and to fleet/insurance partners under bilateral data-sharing
  agreements. Toyota does not publish a self-service developer-API plan with public list pricing. The
  /connectedservices subscription page is not retrievable in machine-readable form.
sources:
  - https://www.toyota.com/
notes: WebFetch on https://www.toyota.com/connectedservices/ returned 404. Toyota's developer / telematics
  partner program is not gated to a public pricing page; integrations are negotiated bilaterally.
plans:
  - id: toyota-contact-sales
    name: Toyota Connected (Contact Sales)
    type: enterprise
    description: Toyota Connected Services and partner telematics integrations are contracted per program
      (consumer subscription bundled with vehicle, or B2B partner agreement). No public developer plan
      or per-API pricing is exposed.
    entries:
      - label: Connected Services / Partner API Access
        name: connected_services_access
        type: subscription
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Connected Services Subscription (consumer)
      - name: Toyota Connected Partner APIs (B2B)
