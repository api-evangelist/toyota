description: 'FinOps shape for Toyota: consumer Connected Services subscriptions bundled with the vehicle,
  plus contracted B2B telematics agreements for fleet/insurance partners. No public per-API meter rates
  exist; this artifact describes structural billing categories only.'
sources:
  - https://www.toyota.com/
notes: Pricing not publicly retrievable; meters are descriptive and unpriced.
billingModel:
  pricingCategory: Subscription + Contracted Data Sharing
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Toyota Connected
  ServiceCategory: Connected Vehicle
  ProviderName: Toyota
  PublisherName: Toyota Motor Sales, U.S.A., Inc.
  InvoiceIssuerName: Toyota Motor Sales, U.S.A., Inc.
  BillingCurrency: USD
meters:
  - name: connected_services_subscription
    description: Per-vehicle Connected Services subscription (consumer-facing).
    unit: vehicle-month
    aggregation: sum
    dimensions:
      - service_package
      - region
  - name: telematics_data_feed
    description: Contracted partner telematics data-sharing volume.
    unit: vehicle-month
    aggregation: sum
    dimensions:
      - partner
      - data_category
principles:
  - name: Visibility
    description: For consumer Connected Services, statements are per-VIN through Toyota's account portal;
      partner data feeds are reconciled monthly against the contracted vehicle population.
  - name: Allocation
    description: Allocate consumer subscriptions per VIN/owner; allocate B2B telematics fees per partner-program
      and use case (insurance, fleet, infrastructure).
  - name: Optimization
    description: For fleets, prune the active-VIN list against actual operating vehicles each cycle; consumers
      should match the Connected Services tier (Audio Plus, Remote Connect, Service Connect, Drive Connect)
      to features they actually use.
  - name: Accountability
    description: Fleet manager owns the partner-feed reconciliation; consumer billing is per-driver.
maintainers:
