description: Toyota does not publish a public developer rate-limit document for its connected-vehicle
  or telematics APIs. Limits are part of the partner integration agreement.
sources:
  - https://www.toyota.com/
notes: No public developer portal with rate-limit specifications was reachable; toyota.com/connectedservices
  returned 404.
limits:
  - name: Toyota Connected partner API limits
    scope: contract
    metric: varies
    limit: not publicly published; defined per partner agreement
policies:
  - name: Partner-Negotiated Limits
    description: Telematics and connected-vehicle data feeds are throttled per partner contract; consumer
      Connected Services apps use Toyota's own clients and do not expose third-party rate ceilings.
