naftiko: 1.0.0-alpha2
info:
  label: Toyota Telematics API — Health
  description: 'Toyota Telematics API — Health. 1 operations. Lead operation: Get Vehicle Health. Self-contained Naftiko capability
    covering one Toyota business surface.'
  tags:
  - Toyota
  - Health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOYOTA_API_KEY: TOYOTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: telematics-health
    baseUri: https://api.eig.toyota.com/telematics/v1
    description: Toyota Telematics API — Health business capability. Self-contained, no shared references.
    resources:
    - name: vehicles-vin-health
      path: /vehicles/{vin}/health
      operations:
      - name: getvehiclehealth
        method: GET
        description: Get Vehicle Health
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vin
          in: path
          type: string
          description: Vehicle Identification Number
          required: true
    authentication:
      type: bearer
      token: '{{env.TOYOTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: telematics-health-rest
    port: 8080
    description: REST adapter for Toyota Telematics API — Health. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vehicles/{vin}/health
      name: vehicles-vin-health
      description: REST surface for vehicles-vin-health.
      operations:
      - method: GET
        name: getvehiclehealth
        description: Get Vehicle Health
        call: telematics-health.getvehiclehealth
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: telematics-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toyota Telematics API — Health. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-vehicle-health
      description: Get Vehicle Health
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: telematics-health.getvehiclehealth
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
