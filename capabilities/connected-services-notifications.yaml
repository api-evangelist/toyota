naftiko: 1.0.0-alpha2
info:
  label: Toyota Connected Services API — Notifications
  description: 'Toyota Connected Services API — Notifications. 1 operations. Lead operation: Get Vehicle Notifications. Self-contained
    Naftiko capability covering one Toyota business surface.'
  tags:
  - Toyota
  - Notifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOYOTA_API_KEY: TOYOTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: connected-services-notifications
    baseUri: https://api.toyota.com/connected/v1
    description: Toyota Connected Services API — Notifications business capability. Self-contained, no shared references.
    resources:
    - name: vehicles-vin-notifications
      path: /vehicles/{vin}/notifications
      operations:
      - name: getvehiclenotifications
        method: GET
        description: Get Vehicle Notifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
        - name: unreadOnly
          in: query
          type: boolean
          description: Return only unread notifications
    authentication:
      type: bearer
      token: '{{env.TOYOTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: connected-services-notifications-rest
    port: 8080
    description: REST adapter for Toyota Connected Services API — Notifications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/vehicles/{vin}/notifications
      name: vehicles-vin-notifications
      description: REST surface for vehicles-vin-notifications.
      operations:
      - method: GET
        name: getvehiclenotifications
        description: Get Vehicle Notifications
        call: connected-services-notifications.getvehiclenotifications
        with:
          vin: rest.vin
          unreadOnly: rest.unreadOnly
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connected-services-notifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toyota Connected Services API — Notifications. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-vehicle-notifications
      description: Get Vehicle Notifications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connected-services-notifications.getvehiclenotifications
      with:
        vin: tools.vin
        unreadOnly: tools.unreadOnly
      outputParameters:
      - type: object
        mapping: $.
