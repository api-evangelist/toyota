naftiko: "1.0.0-alpha1"

info:
  label: "Toyota Telematics"
  description: "Toyota Telematics API providing connected service subscriptions, vehicle health data, telemetry readings, GPS location, trip history, and fleet enrollment for Toyota North America vehicles."
  tags:
    - Automotive
    - Telematics
    - Fleet Management
    - Vehicle Data
    - Connected Car
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TOYOTA_TELEMATICS_TOKEN: TOYOTA_TELEMATICS_TOKEN

capability:
  consumes:
    - type: http
      namespace: toyota-telematics
      baseUri: https://api.eig.toyota.com/telematics/v1
      description: "Toyota Telematics API for vehicle fleet data access"
      authentication:
        type: bearer
        token: "{{TOYOTA_TELEMATICS_TOKEN}}"
      resources:
        - name: vehicles
          path: /vehicles
          description: "Fleet vehicle listing"
          operations:
            - name: list-vehicles
              method: GET
              description: "List vehicles enrolled in telematics program"
              inputParameters:
                - name: fleetId
                  in: query
                  type: string
                  required: false
                  description: "Fleet identifier filter"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Enrollment status filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: vehicle
          path: /vehicles/{vin}
          description: "Individual vehicle telematics"
          operations:
            - name: get-vehicle
              method: GET
              description: "Get telematics details for a vehicle by VIN"
              inputParameters:
                - name: vin
                  in: path
                  type: string
                  required: true
                  description: "17-character VIN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: subscriptions
          path: /vehicles/{vin}/subscriptions
          description: "Vehicle connected service subscriptions"
          operations:
            - name: get-vehicle-subscriptions
              method: GET
              description: "Get connected service and satellite radio subscription details"
              inputParameters:
                - name: vin
                  in: path
                  type: string
                  required: true
                  description: "VIN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: health
          path: /vehicles/{vin}/health
          description: "Vehicle health data"
          operations:
            - name: get-vehicle-health
              method: GET
              description: "Get vehicle health status and warning lights"
              inputParameters:
                - name: vin
                  in: path
                  type: string
                  required: true
                  description: "VIN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: telemetry
          path: /vehicles/{vin}/telemetry
          description: "Vehicle telemetry data"
          operations:
            - name: get-vehicle-telemetry
              method: GET
              description: "Get odometer, fuel level, and distance data"
              inputParameters:
                - name: vin
                  in: path
                  type: string
                  required: true
                  description: "VIN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: location
          path: /vehicles/{vin}/location
          description: "Vehicle GPS location"
          operations:
            - name: get-vehicle-location
              method: GET
              description: "Get current GPS location of vehicle"
              inputParameters:
                - name: vin
                  in: path
                  type: string
                  required: true
                  description: "VIN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: trips
          path: /vehicles/{vin}/trips
          description: "Vehicle trip history"
          operations:
            - name: get-vehicle-trips
              method: GET
              description: "Get trip history for a date range"
              inputParameters:
                - name: vin
                  in: path
                  type: string
                  required: true
                  description: "VIN"
                - name: fromDate
                  in: query
                  type: string
                  required: true
                  description: "Start date"
                - name: toDate
                  in: query
                  type: string
                  required: true
                  description: "End date"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max trips (max 50)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: enroll
          path: /fleet/{fleetId}/vehicles/enroll
          description: "Vehicle fleet enrollment"
          operations:
            - name: enroll-vehicle
              method: POST
              description: "Enroll a vehicle in the telematics fleet"
              inputParameters:
                - name: fleetId
                  in: path
                  type: string
                  required: true
                  description: "Fleet identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  vin: "{{tools.vin}}"
                  services: "{{tools.services}}"

  exposes:
    - type: rest
      port: 8100
      namespace: toyota-telematics-api
      resources:
        - path: /v1/vehicles
          name: vehicles
          description: "Vehicle list"
          operations:
            - method: GET
              name: list-vehicles
              description: "List fleet vehicles"
              call: "toyota-telematics.list-vehicles"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/vehicles/{vin}
          name: vehicle
          description: "Individual vehicle"
          operations:
            - method: GET
              name: get-vehicle
              description: "Get vehicle telematics"
              call: "toyota-telematics.get-vehicle"
              with:
                vin: "rest.vin"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: toyota-telematics-mcp
      transport: http
      tools:
        - name: list-vehicles
          description: "List vehicles enrolled in the Toyota telematics program"
          hints:
            readOnly: true
            openWorld: true
          call: "toyota-telematics.list-vehicles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vehicle
          description: "Get telematics enrollment details for a specific vehicle by VIN"
          hints:
            readOnly: true
            idempotent: true
          call: "toyota-telematics.get-vehicle"
          with:
            vin: "tools.vin"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vehicle-subscriptions
          description: "Get connected services and satellite radio subscription details for a vehicle"
          hints:
            readOnly: true
            idempotent: true
          call: "toyota-telematics.get-vehicle-subscriptions"
          with:
            vin: "tools.vin"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vehicle-health
          description: "Get vehicle health status including warning lights and oil level"
          hints:
            readOnly: true
            idempotent: true
          call: "toyota-telematics.get-vehicle-health"
          with:
            vin: "tools.vin"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vehicle-telemetry
          description: "Get odometer, fuel level, and distance telemetry data for a vehicle"
          hints:
            readOnly: true
            idempotent: true
          call: "toyota-telematics.get-vehicle-telemetry"
          with:
            vin: "tools.vin"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vehicle-location
          description: "Get the current GPS location of a connected vehicle"
          hints:
            readOnly: true
            idempotent: true
          call: "toyota-telematics.get-vehicle-location"
          with:
            vin: "tools.vin"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vehicle-trips
          description: "Get trip history for a vehicle over a specified date range"
          hints:
            readOnly: true
            openWorld: true
          call: "toyota-telematics.get-vehicle-trips"
          with:
            vin: "tools.vin"
            fromDate: "tools.fromDate"
            toDate: "tools.toDate"
          outputParameters:
            - type: object
              mapping: "$."
        - name: enroll-vehicle
          description: "Enroll a new vehicle in the telematics fleet program"
          hints:
            readOnly: false
          call: "toyota-telematics.enroll-vehicle"
          with:
            fleetId: "tools.fleetId"
          outputParameters:
            - type: object
              mapping: "$."
