naftiko: 1.0.0-alpha2
info:
  label: Toyota Fleet Management
  description: Workflow capability for fleet managers and rental car operators combining Toyota Telematics and Connected Services
    APIs. Enables vehicle enrollment, health monitoring, location tracking, telemetry analysis, and trip reporting for Toyota
    fleet operations.
  tags:
  - Automotive
  - Fleet Management
  - Telematics
  - Vehicle Health
  - Connected Car
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TOYOTA_TELEMATICS_TOKEN: TOYOTA_TELEMATICS_TOKEN
    TOYOTA_CONNECTED_TOKEN: TOYOTA_CONNECTED_TOKEN
capability:
  consumes:
  - type: http
    namespace: toyota-telematics
    baseUri: https://api.eig.toyota.com/telematics/v1
    description: Toyota Telematics API for vehicle fleet data access
    authentication:
      type: bearer
      token: '{{TOYOTA_TELEMATICS_TOKEN}}'
    resources:
    - name: vehicles
      path: /vehicles
      description: Fleet vehicle listing
      operations:
      - name: list-vehicles
        method: GET
        description: List vehicles enrolled in telematics program
        inputParameters:
        - name: fleetId
          in: query
          type: string
          required: false
          description: Fleet identifier filter
        - name: status
          in: query
          type: string
          required: false
          description: Enrollment status filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vehicle
      path: /vehicles/{vin}
      description: Individual vehicle telematics
      operations:
      - name: get-vehicle
        method: GET
        description: Get telematics details for a vehicle by VIN
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: 17-character VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: subscriptions
      path: /vehicles/{vin}/subscriptions
      description: Vehicle connected service subscriptions
      operations:
      - name: get-vehicle-subscriptions
        method: GET
        description: Get connected service and satellite radio subscription details
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: health
      path: /vehicles/{vin}/health
      description: Vehicle health data
      operations:
      - name: get-vehicle-health
        method: GET
        description: Get vehicle health status and warning lights
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: telemetry
      path: /vehicles/{vin}/telemetry
      description: Vehicle telemetry data
      operations:
      - name: get-vehicle-telemetry
        method: GET
        description: Get odometer, fuel level, and distance data
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: location
      path: /vehicles/{vin}/location
      description: Vehicle GPS location
      operations:
      - name: get-vehicle-location
        method: GET
        description: Get current GPS location of vehicle
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: trips
      path: /vehicles/{vin}/trips
      description: Vehicle trip history
      operations:
      - name: get-vehicle-trips
        method: GET
        description: Get trip history for a date range
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        - name: fromDate
          in: query
          type: string
          required: true
          description: Start date
        - name: toDate
          in: query
          type: string
          required: true
          description: End date
        - name: limit
          in: query
          type: integer
          required: false
          description: Max trips (max 50)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: enroll
      path: /fleet/{fleetId}/vehicles/enroll
      description: Vehicle fleet enrollment
      operations:
      - name: enroll-vehicle
        method: POST
        description: Enroll a vehicle in the telematics fleet
        inputParameters:
        - name: fleetId
          in: path
          type: string
          required: true
          description: Fleet identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            vin: '{{tools.vin}}'
            services: '{{tools.services}}'
  - type: http
    namespace: toyota-connected
    baseUri: https://api.toyota.com/connected/v1
    description: Toyota Connected Services API for real-time vehicle data and remote commands
    authentication:
      type: bearer
      token: '{{TOYOTA_CONNECTED_TOKEN}}'
    resources:
    - name: vehicles
      path: /vehicles
      description: Connected vehicle list
      operations:
      - name: list-connected-vehicles
        method: GET
        description: List all connected vehicles registered to the account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vehicle-status
      path: /vehicles/{vin}/status
      description: Vehicle real-time status
      operations:
      - name: get-vehicle-status
        method: GET
        description: Get current vehicle status (doors, ignition, windows)
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: status-refresh
      path: /vehicles/{vin}/status/refresh
      description: Refresh vehicle status
      operations:
      - name: refresh-vehicle-status
        method: POST
        description: Wake vehicle and refresh status data
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            deviceId: '{{tools.deviceId}}'
            deviceType: '{{tools.deviceType}}'
            guid: '{{tools.guid}}'
            vin: '{{tools.vin}}'
    - name: vehicle-health
      path: /vehicles/{vin}/health
      description: Vehicle health diagnostics
      operations:
      - name: get-vehicle-health-status
        method: GET
        description: Get oil level and warning lights
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vehicle-location
      path: /vehicles/{vin}/location
      description: Vehicle location
      operations:
      - name: get-vehicle-position
        method: GET
        description: Get last known GPS location when parked
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: electric-status
      path: /vehicles/{vin}/electric
      description: EV battery and charging status
      operations:
      - name: get-electric-status
        method: GET
        description: Get EV battery level, range, and charging status
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: electric-refresh
      path: /vehicles/{vin}/electric/refresh
      description: Refresh EV status
      operations:
      - name: refresh-electric-status
        method: POST
        description: Request updated state-of-charge from vehicle
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: climate
      path: /vehicles/{vin}/climate
      description: Climate control status and settings
      operations:
      - name: get-climate-status
        method: GET
        description: Get current climate control settings
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: climate-command
      path: /vehicles/{vin}/climate/command
      description: Remote climate control
      operations:
      - name: send-climate-command
        method: POST
        description: Send climate start/stop command to vehicle
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            command: '{{tools.command}}'
            temperature: '{{tools.temperature}}'
    - name: trips
      path: /vehicles/{vin}/trips
      description: Trip history
      operations:
      - name: get-trips
        method: GET
        description: Get trip history for a date range
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        - name: fromDate
          in: query
          type: string
          required: true
          description: Start date
        - name: toDate
          in: query
          type: string
          required: true
          description: End date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: notifications
      path: /vehicles/{vin}/notifications
      description: Vehicle notifications
      operations:
      - name: get-vehicle-notifications
        method: GET
        description: Get vehicle alerts and notifications
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: remote-command
      path: /vehicles/{vin}/remote-command
      description: Remote vehicle commands
      operations:
      - name: send-remote-command
        method: POST
        description: Send remote command (lock, unlock, horn, etc.)
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            command: '{{tools.command}}'
            beeps: '{{tools.beeps}}'
    - name: service-history
      path: /vehicles/{vin}/service-history
      description: Vehicle service history
      operations:
      - name: get-service-history
        method: GET
        description: Get service history records
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: toyota-fleet-api
    description: Unified REST API for Toyota fleet management and vehicle monitoring.
    resources:
    - path: /v1/vehicles
      name: vehicles
      description: Fleet vehicle management
      operations:
      - method: GET
        name: list-vehicles
        description: List fleet vehicles
        call: toyota-telematics.list-vehicles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}
      name: vehicle
      description: Individual vehicle
      operations:
      - method: GET
        name: get-vehicle
        description: Get vehicle telematics
        call: toyota-telematics.get-vehicle
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/health
      name: vehicle-health
      description: Vehicle health status
      operations:
      - method: GET
        name: get-vehicle-health
        description: Get vehicle health
        call: toyota-telematics.get-vehicle-health
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/telemetry
      name: vehicle-telemetry
      description: Vehicle telemetry
      operations:
      - method: GET
        name: get-vehicle-telemetry
        description: Get vehicle telemetry
        call: toyota-telematics.get-vehicle-telemetry
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/location
      name: vehicle-location
      description: Vehicle location
      operations:
      - method: GET
        name: get-vehicle-location
        description: Get vehicle GPS location
        call: toyota-telematics.get-vehicle-location
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/trips
      name: vehicle-trips
      description: Vehicle trip history
      operations:
      - method: GET
        name: get-vehicle-trips
        description: Get trip history
        call: toyota-telematics.get-vehicle-trips
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/subscriptions
      name: subscriptions
      description: Connected service subscriptions
      operations:
      - method: GET
        name: get-vehicle-subscriptions
        description: Get subscription details
        call: toyota-telematics.get-vehicle-subscriptions
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/status
      name: vehicle-status
      description: Real-time vehicle status
      operations:
      - method: GET
        name: get-vehicle-status
        description: Get current vehicle status
        call: toyota-connected.get-vehicle-status
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/ev-status
      name: ev-status
      description: EV battery and charging
      operations:
      - method: GET
        name: get-ev-status
        description: Get EV battery and charging status
        call: toyota-connected.get-electric-status
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: toyota-fleet-mcp
    transport: http
    description: MCP server for AI-assisted Toyota fleet management and vehicle monitoring.
    tools:
    - name: list-fleet-vehicles
      description: List all vehicles enrolled in the Toyota telematics fleet program
      hints:
        readOnly: true
        openWorld: true
      call: toyota-telematics.list-vehicles
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle
      description: Get telematics enrollment details for a specific fleet vehicle by VIN
      hints:
        readOnly: true
        idempotent: true
      call: toyota-telematics.get-vehicle
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle-health
      description: Get vehicle health status including warning lights and oil level for a fleet vehicle
      hints:
        readOnly: true
        idempotent: true
      call: toyota-telematics.get-vehicle-health
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle-telemetry
      description: Get odometer, fuel level, and estimated range for a fleet vehicle
      hints:
        readOnly: true
        idempotent: true
      call: toyota-telematics.get-vehicle-telemetry
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle-location
      description: Get the current GPS coordinates of a fleet vehicle
      hints:
        readOnly: true
        idempotent: true
      call: toyota-telematics.get-vehicle-location
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: get-trip-history
      description: Get trip history for a fleet vehicle over a specified date range
      hints:
        readOnly: true
        openWorld: true
      call: toyota-telematics.get-vehicle-trips
      with:
        vin: tools.vin
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle-subscriptions
      description: Get connected services and satellite radio subscription status for a vehicle
      hints:
        readOnly: true
        idempotent: true
      call: toyota-telematics.get-vehicle-subscriptions
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: enroll-fleet-vehicle
      description: Enroll a new vehicle in the Toyota telematics fleet program
      hints:
        readOnly: false
      call: toyota-telematics.enroll-vehicle
      with:
        fleetId: tools.fleetId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle-door-status
      description: Get real-time door lock and window status for a connected vehicle
      hints:
        readOnly: true
        idempotent: true
      call: toyota-connected.get-vehicle-status
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ev-battery-status
      description: Get EV battery percentage, electric range, and charging status for hybrid/EV vehicles
      hints:
        readOnly: true
        idempotent: true
      call: toyota-connected.get-electric-status
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle-alerts
      description: Get maintenance alerts and vehicle notifications for a connected vehicle
      hints:
        readOnly: true
        openWorld: true
      call: toyota-connected.get-vehicle-notifications
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: get-service-history
      description: Get dealer service history records for a vehicle
      hints:
        readOnly: true
        idempotent: true
      call: toyota-connected.get-service-history
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
