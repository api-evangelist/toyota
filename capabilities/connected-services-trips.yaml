naftiko: 1.0.0-alpha2
info:
  label: Toyota Connected Services API — Trips
  description: 'Toyota Connected Services API — Trips. 1 operations. Lead operation: Get Trips. Self-contained Naftiko capability
    covering one Toyota business surface.'
  tags:
  - Toyota
  - Trips
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOYOTA_API_KEY: TOYOTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: connected-services-trips
    baseUri: https://api.toyota.com/connected/v1
    description: Toyota Connected Services API — Trips business capability. Self-contained, no shared references.
    resources:
    - name: vehicles-vin-trips
      path: /vehicles/{vin}/trips
      operations:
      - name: gettrips
        method: GET
        description: Get Trips
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
        - name: fromDate
          in: query
          type: string
          description: Start date for trip history
          required: true
        - name: toDate
          in: query
          type: string
          description: End date for trip history
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum trips to return
        - name: offset
          in: query
          type: integer
          description: Pagination offset
        - name: includeRoute
          in: query
          type: boolean
          description: Include GPS route for each trip
        - name: includeSummary
          in: query
          type: boolean
          description: Include trip summary statistics
    authentication:
      type: bearer
      token: '{{env.TOYOTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: connected-services-trips-rest
    port: 8080
    description: REST adapter for Toyota Connected Services API — Trips. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vehicles/{vin}/trips
      name: vehicles-vin-trips
      description: REST surface for vehicles-vin-trips.
      operations:
      - method: GET
        name: gettrips
        description: Get Trips
        call: connected-services-trips.gettrips
        with:
          vin: rest.vin
          fromDate: rest.fromDate
          toDate: rest.toDate
          limit: rest.limit
          offset: rest.offset
          includeRoute: rest.includeRoute
          includeSummary: rest.includeSummary
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connected-services-trips-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toyota Connected Services API — Trips. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-trips
      description: Get Trips
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connected-services-trips.gettrips
      with:
        vin: tools.vin
        fromDate: tools.fromDate
        toDate: tools.toDate
        limit: tools.limit
        offset: tools.offset
        includeRoute: tools.includeRoute
        includeSummary: tools.includeSummary
      outputParameters:
      - type: object
        mapping: $.
