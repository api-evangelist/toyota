naftiko: 1.0.0-alpha2
info:
  label: Toyota Connected Services API — Electric
  description: 'Toyota Connected Services API — Electric. 2 operations. Lead operation: Get Electric Status. Self-contained
    Naftiko capability covering one Toyota business surface.'
  tags:
  - Toyota
  - Electric
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOYOTA_API_KEY: TOYOTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: connected-services-electric
    baseUri: https://api.toyota.com/connected/v1
    description: Toyota Connected Services API — Electric business capability. Self-contained, no shared references.
    resources:
    - name: vehicles-vin-electric
      path: /vehicles/{vin}/electric
      operations:
      - name: getelectricstatus
        method: GET
        description: Get Electric Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
    - name: vehicles-vin-electric-refresh
      path: /vehicles/{vin}/electric/refresh
      operations:
      - name: refreshelectricstatus
        method: POST
        description: Refresh Electric Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TOYOTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: connected-services-electric-rest
    port: 8080
    description: REST adapter for Toyota Connected Services API — Electric. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vehicles/{vin}/electric
      name: vehicles-vin-electric
      description: REST surface for vehicles-vin-electric.
      operations:
      - method: GET
        name: getelectricstatus
        description: Get Electric Status
        call: connected-services-electric.getelectricstatus
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/electric/refresh
      name: vehicles-vin-electric-refresh
      description: REST surface for vehicles-vin-electric-refresh.
      operations:
      - method: POST
        name: refreshelectricstatus
        description: Refresh Electric Status
        call: connected-services-electric.refreshelectricstatus
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connected-services-electric-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toyota Connected Services API — Electric. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-electric-status
      description: Get Electric Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connected-services-electric.getelectricstatus
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
    - name: refresh-electric-status
      description: Refresh Electric Status
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connected-services-electric.refreshelectricstatus
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
