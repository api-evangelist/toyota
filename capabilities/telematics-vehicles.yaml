      operations:
      - method: GET
        name: getvehicle
        description: Get Vehicle
        call: telematics-vehicles.getvehicle
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{vin}/health
