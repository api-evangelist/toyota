naftiko: 1.0.0-alpha2
info:
  label: Toyota Telematics API — Subscriptions
  description: 'Toyota Telematics API — Subscriptions. 1 operations. Lead operation: Get Vehicle Subscriptions. Self-contained
    Naftiko capability covering one Toyota business surface.'
  tags:
  - Toyota
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOYOTA_API_KEY: TOYOTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: telematics-subscriptions
    baseUri: https://api.eig.toyota.com/telematics/v1
    description: Toyota Telematics API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: vehicles-vin-subscriptions
      path: /vehicles/{vin}/subscriptions
      operations:
      - name: getvehiclesubscriptions
        method: GET
        description: Get Vehicle Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vin
          in: path
          type: string
          description: Vehicle Identification Number
          required: true
    authentication:
      type: bearer
      token: '{{env.TOYOTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: telematics-subscriptions-rest
    port: 8080
    description: REST adapter for Toyota Telematics API — Subscriptions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vehicles/{vin}/subscriptions
      name: vehicles-vin-subscriptions
      description: REST surface for vehicles-vin-subscriptions.
      operations:
      - method: GET
        name: getvehiclesubscriptions
        description: Get Vehicle Subscriptions
        call: telematics-subscriptions.getvehiclesubscriptions
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: telematics-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toyota Telematics API — Subscriptions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-vehicle-subscriptions
      description: Get Vehicle Subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: telematics-subscriptions.getvehiclesubscriptions
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
